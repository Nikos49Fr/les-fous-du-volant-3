[build]
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  framework = "#custom"

  [dev.https]
    certFile = "dev-certs/localhost.pem"
    keyFile = "dev-certs/localhost-key.pem"

[[redirects]]
  from = "/api/auth/twitch/login"
  to = "/.netlify/functions/twitch-login"
  status = 200

[[redirects]]
  from = "/api/auth/twitch/callback"
  to = "/.netlify/functions/twitch-callback"
  status = 200

[[redirects]]
  from = "/api/auth/twitch/me"
  to = "/.netlify/functions/twitch-me"
  status = 200

[[redirects]]
  from = "/api/auth/twitch/logout"
  to = "/.netlify/functions/twitch-logout"
  status = 200
